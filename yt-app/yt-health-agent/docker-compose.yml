services:
  ollama:
    image: ollama/ollama:latest
    container_name: ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama:/root/.ollama
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 5s
      timeout: 10s
      retries: 20
      start_period: 10s

  ollama-init:
    image: ollama/ollama:latest
    container_name: ollama_init
    environment:
      - OLLAMA_HOST=http://ollama:11434
    entrypoint: ["ollama", "pull", "llama3.1:8b"]
    depends_on:
      ollama:
        condition: service_healthy
    restart: "no"

  runner:
    build: ./runner
    container_name: yt_runner
    env_file:
      - .env
    environment:
      - TZ=America/Chicago
      - OLLAMA_URL=http://ollama:11434
      - OUT_CSV=/data/results.csv
      - STATE_FILE=/data/state.json
    volumes:
      - ./data:/data
    depends_on:
      ollama:
        condition: service_healthy
      ollama-init:
        condition: service_completed_successfully

volumes:
  ollama: