name: Upload Data

on:
  schedule:
    - cron: '0 8 * * *'
  workflow_dispatch:

jobs:
  run_uploaders:
    runs-on: ubuntu-latest
    name: Executes all of the uploaders

    defaults:
      run:
        working-directory: ./yt-app 

    steps:
      - name: Checkout repo
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: 3.13

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
        
      - name: Run all uploaders
        env:
          NEXT_PUBLIC_API_URL: ${{ vars.NEXT_PUBLIC_API_URL }}
        run: |
          python ./uploaders/video_uploader.py
          python ./uploaders/transcript_uploader.py
